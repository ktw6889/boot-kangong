server.port = 8080
server.servlet.context-path=/kangong

spring.mvc.view.prefix=/views/
spring.mvc.view.suffix=.jsp

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.view-names=thymeleaf/*


spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms

spring.config.import=optional:application-secret.properties

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/SECKIMDB?useSSL=false&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
spring.datasource.hikari.maximum-pool-size=20
# spring.datasource.username / password -> application-secret.properties (git 미포함)

mybatis.mapper-locations=classpath:mapper/mapping*.xml


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Security - Remember Me
security.remember-me.key=kangong
security.remember-me.token-validity-seconds=604800

# Selenium ChromeDriver
stock.selenium.driver-id=webdriver.chrome.driver
# stock.selenium.driver-path -> application-secret.properties (로컬 경로, git 미포함)

# Selenium XPath/CSS Selectors
stock.selenium.selector.naver-finance-url=https://finance.naver.com/item/main.naver?code=
stock.selenium.selector.iframe-coinfo=coinfo_cp
stock.selenium.selector.analysis-tab=/html/body/div[3]/div[2]/div[2]/div[1]/ul/li[6]/a
stock.selenium.selector.dividend-value=/html/body/div/form/div[1]/div/div[2]/div[1]/div/table/tbody/tr[3]/td/dl/dt[6]/b
stock.selenium.selector.enterprise-state=#header-menu > div.wrapper-menu > dl > dt.on > a
stock.selenium.selector.annual-tab=//*[@id="cns_Tab21"]
stock.selenium.selector.enterprise-header=/html/body/div/form/div[1]/div/div[2]/div[3]/div/div/div[14]/table[2]/thead/tr[2]
stock.selenium.selector.enterprise-tbody=/html/body/div/form/div[1]/div/div[2]/div[3]/div/div/div[14]/table[2]/tbody
stock.selenium.selector.financial-analysis=/html/body/div/form/div[1]/div/div[2]/div[1]/dl/dt[3]/a
stock.selenium.selector.balance-sheet-tab=//*[@id="rpt_tab2"]
stock.selenium.selector.balance-sheet-header=/html/body/div/form/div[1]/div/div[2]/div[3]/div/div/div[5]/table[2]/thead/tr
stock.selenium.selector.balance-sheet-tbody=/html/body/div/form/div[1]/div/div[2]/div[3]/div/div/div[5]/table[2]/tbody

# Google Calendar API
google.calendar.client-id=YOUR_CLIENT_ID
google.calendar.client-secret=YOUR_CLIENT_SECRET
google.calendar.redirect-uri=http://localhost:8080/kangong/calendar/google/callback
google.calendar.scope=https://www.googleapis.com/auth/calendar

# Macro Indicator APIs (증시 사계론 자동 판별)
# ECOS(한국은행), FRED(미국 연준) 인증키 -> application-secret.properties (git 미포함)
# 지표 캐시 유지 시간 (밀리초, 기본 6시간)
macro.cache.ttl-ms=21600000

#root Level info 설정
logging.level.root=info

