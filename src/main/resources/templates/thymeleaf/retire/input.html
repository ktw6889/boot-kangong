<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/thymeleaf/retire/layout/retireLayout :: setContent(~{this::content} )}">
<th:block th:fragment="content">

<style>
    .card-header { font-weight: bold; background-color: #f8f9fa; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: #495057; }
    .input-group-text { font-size: 0.8rem; min-width: 40px; justify-content: center; }
    .asset-table th { font-size: 0.8rem; background: #f1f3f5; text-align: center; padding: 6px; }
    .asset-table td { padding: 4px; }
    .asset-table input { text-align: right; }
    .re-row { background: #fff; border: 1px solid #dee2e6; border-radius: 4px; padding: 8px; margin-bottom: 8px; }
</style>

<div class="container mt-4 mb-5">
    <h3 class="mb-4">노후 자산 관리 시뮬레이터</h3>

    <form th:action="@{/retire/result}" method="post" th:object="${input}" id="retireForm">

        <!-- 인적정보 -->
        <div class="card mb-3">
            <div class="card-header">인적정보</div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-3">
                        <label>본인 출생년도</label>
                        <input type="number" class="form-control" th:field="*{birthYear}" min="1940" max="2010">
                    </div>
                    <div class="form-group col-md-3">
                        <label>배우자 출생년도</label>
                        <input type="number" class="form-control" th:field="*{spouseBirthYear}" min="1940" max="2010">
                    </div>
                    <div class="form-group col-md-3">
                        <label>퇴직년도</label>
                        <input type="number" class="form-control" th:field="*{retireYear}" min="2024" max="2060">
                    </div>
                    <div class="form-group col-md-3">
                        <label>연금 수령 시작 나이</label>
                        <input type="number" class="form-control" th:field="*{pensionStartAge}" min="60" max="70">
                    </div>
                </div>
            </div>
        </div>

        <!-- 월간 수입/지출 -->
        <div class="card mb-3">
            <div class="card-header">월간 수입/지출 (만원)</div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-3">
                        <label>월 투자가능금액</label>
                        <div class="input-group">
                            <input type="number" class="form-control" th:field="*{monthlyInvestment}">
                            <div class="input-group-append"><span class="input-group-text">만원</span></div>
                        </div>
                    </div>
                    <div class="form-group col-md-3">
                        <label>월 생활비</label>
                        <div class="input-group">
                            <input type="number" class="form-control" th:field="*{monthlyExpense}">
                            <div class="input-group-append"><span class="input-group-text">만원</span></div>
                        </div>
                    </div>
                    <div class="form-group col-md-3">
                        <label>본인 국민연금 (월)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" th:field="*{nationalPension}">
                            <div class="input-group-append"><span class="input-group-text">만원</span></div>
                        </div>
                    </div>
                    <div class="form-group col-md-3">
                        <label>배우자 국민연금 (월)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" th:field="*{spouseNationalPension}">
                            <div class="input-group-append"><span class="input-group-text">만원</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 금융자산 (본인/배우자 분리) -->
        <div class="card mb-3">
            <div class="card-header">금융자산 (만원)</div>
            <div class="card-body p-2">
                <table class="table table-sm table-bordered asset-table mb-0">
                    <thead>
                    <tr>
                        <th style="width:20%">구분</th>
                        <th style="width:40%">본인</th>
                        <th style="width:40%">배우자</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td class="text-center font-weight-bold">예금</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{depositSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{depositSpouse}"></td>
                    </tr>
                    <tr>
                        <td class="text-center font-weight-bold">주식/펀드</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{stocksSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{stocksSpouse}"></td>
                    </tr>
                    <tr>
                        <td class="text-center font-weight-bold">연금저축</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{pensionSavingSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{pensionSavingSpouse}"></td>
                    </tr>
                    <tr>
                        <td class="text-center font-weight-bold">IRP</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{irpSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{irpSpouse}"></td>
                    </tr>
                    <tr>
                        <td class="text-center font-weight-bold">ISA</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{isaSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{isaSpouse}"></td>
                    </tr>
                    <tr>
                        <td class="text-center font-weight-bold">보험(해약환급금)</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{insuranceSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{insuranceSpouse}"></td>
                    </tr>
                    <tr>
                        <td class="text-center font-weight-bold text-danger">대출(-)</td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{loanSelf}"></td>
                        <td><input type="number" class="form-control form-control-sm" th:field="*{loanSpouse}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 부동산 (복수) -->
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                부동산
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRealEstate()">+ 추가</button>
            </div>
            <div class="card-body p-2">
                <div class="text-muted mb-2 px-1" style="font-size:0.78rem">
                    매도년도 0 = 보유 유지 | 매도 시 세후 금액이 소유자의 연금저축으로 입금
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-bordered mb-0" style="font-size:0.82rem;" id="reTable">
                        <thead class="thead-light">
                        <tr>
                            <th style="min-width:140px">설명</th>
                            <th style="min-width:90px">시가(만원)</th>
                            <th style="min-width:90px">공시지가(만원)</th>
                            <th style="min-width:70px">종류</th>
                            <th style="min-width:70px">소유자</th>
                            <th style="min-width:70px">매도년도</th>
                            <th style="min-width:60px">상승률%</th>
                            <th style="width:40px"></th>
                        </tr>
                        </thead>
                        <tbody id="reContainer">
                        <tr th:each="item, stat : ${input.realEstateList}" class="re-row">
                            <td><input type="text" class="form-control form-control-sm"
                                       th:name="${'realEstateList[' + stat.index + '].name'}"
                                       th:value="${item.name}"></td>
                            <td><input type="number" class="form-control form-control-sm text-right"
                                       th:name="${'realEstateList[' + stat.index + '].value'}"
                                       th:value="${item.value}"></td>
                            <td><input type="number" class="form-control form-control-sm text-right"
                                       th:name="${'realEstateList[' + stat.index + '].officialPrice'}"
                                       th:value="${item.officialPrice}"></td>
                            <td>
                                <select class="form-control form-control-sm"
                                        th:name="${'realEstateList[' + stat.index + '].type'}">
                                    <option value="HOUSE" th:selected="${item.type == 'HOUSE'}">주택</option>
                                    <option value="LAND" th:selected="${item.type == 'LAND'}">토지</option>
                                    <option value="COMMERCIAL" th:selected="${item.type == 'COMMERCIAL'}">상가</option>
                                </select>
                            </td>
                            <td>
                                <select class="form-control form-control-sm"
                                        th:name="${'realEstateList[' + stat.index + '].owner'}">
                                    <option value="SELF" th:selected="${item.owner == 'SELF'}">본인</option>
                                    <option value="SPOUSE" th:selected="${item.owner == 'SPOUSE'}">배우자</option>
                                    <option value="JOINT" th:selected="${item.owner == 'JOINT'}">공동</option>
                                </select>
                            </td>
                            <td><input type="number" class="form-control form-control-sm text-right"
                                       th:name="${'realEstateList[' + stat.index + '].saleYear'}"
                                       th:value="${item.saleYear}" placeholder="0"></td>
                            <td><input type="number" step="0.1" class="form-control form-control-sm text-right"
                                       th:name="${'realEstateList[' + stat.index + '].growthRate'}"
                                       th:value="${item.growthRate}"></td>
                            <td class="text-center align-middle">
                                <button type="button" class="btn btn-sm btn-outline-danger px-1 py-0"
                                        onclick="removeRe(this)">X</button>
                            </td>
                        </tr>
                        </tbody>
                        <tfoot class="bg-light">
                        <tr>
                            <td class="text-center font-weight-bold">합계</td>
                            <td class="text-right font-weight-bold" id="reTotalValue">-</td>
                            <td class="text-right font-weight-bold" id="reTotalOfficial">-</td>
                            <td colspan="5"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- 수익률 가정 -->
        <div class="card mb-3">
            <div class="card-header">수익률 가정</div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>금융자산 연 수익률</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-control" th:field="*{annualReturn}">
                            <div class="input-group-append"><span class="input-group-text">%</span></div>
                        </div>
                    </div>
                    <div class="form-group col-md-6">
                        <label>물가상승률</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-control" th:field="*{inflationRate}">
                            <div class="input-group-append"><span class="input-group-text">%</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block mb-4">시뮬레이션 실행</button>
    </form>
</div>

<script th:inline="javascript">
var reIdx = /*[[${input.realEstateList.size()}]]*/ 1;

function addRealEstate() {
    var row = '<tr class="re-row">' +
        '<td><input type="text" class="form-control form-control-sm" name="realEstateList['+reIdx+'].name" placeholder="설명"></td>' +
        '<td><input type="number" class="form-control form-control-sm text-right" name="realEstateList['+reIdx+'].value" placeholder="0"></td>' +
        '<td><input type="number" class="form-control form-control-sm text-right" name="realEstateList['+reIdx+'].officialPrice" placeholder="0"></td>' +
        '<td><select class="form-control form-control-sm" name="realEstateList['+reIdx+'].type"><option value="HOUSE">주택</option><option value="LAND">토지</option><option value="COMMERCIAL">상가</option></select></td>' +
        '<td><select class="form-control form-control-sm" name="realEstateList['+reIdx+'].owner"><option value="SELF">본인</option><option value="SPOUSE">배우자</option><option value="JOINT">공동</option></select></td>' +
        '<td><input type="number" class="form-control form-control-sm text-right" name="realEstateList['+reIdx+'].saleYear" value="0"></td>' +
        '<td><input type="number" step="0.1" class="form-control form-control-sm text-right" name="realEstateList['+reIdx+'].growthRate" value="2.0"></td>' +
        '<td class="text-center align-middle"><button type="button" class="btn btn-sm btn-outline-danger px-1 py-0" onclick="removeRe(this)">X</button></td>' +
        '</tr>';
    $('#reContainer').append(row);
    reIdx++;
}

function removeRe(btn) {
    $(btn).closest('.re-row').remove();
    reindex();
}

function reindex() {
    $('#reContainer .re-row').each(function(i) {
        $(this).find('input, select').each(function() {
            var n = $(this).attr('name');
            if (n) $(this).attr('name', n.replace(/realEstateList\[\d+\]/, 'realEstateList['+i+']'));
        });
    });
    reIdx = $('#reContainer .re-row').length;
}

function calcReTotal() {
    var tv = 0, to = 0;
    $('#reContainer .re-row').each(function() {
        var inputs = $(this).find('input[type="number"]');
        tv += parseInt(inputs.eq(0).val()) || 0;
        to += parseInt(inputs.eq(1).val()) || 0;
    });
    $('#reTotalValue').text(tv.toLocaleString());
    $('#reTotalOfficial').text(to.toLocaleString());
}

$('#retireForm').on('submit', function() { reindex(); });
$(document).on('input', '#reContainer input[type="number"]', calcReTotal);
$(document).ready(calcReTotal);
</script>

</th:block>
</th:block>
</html>
